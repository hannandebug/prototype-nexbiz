<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Profil Bisnis - AKSA</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="phone">
    <div class="status-bar">
      <span class="time">09:41</span>
      <div class="status-icons">
        <i class="fas fa-signal"></i>
        <i class="fas fa-wifi"></i>
        <i class="fas fa-battery-three-quarters"></i>
      </div>
    </div>

    <div class="content">
      <div class="page-header">
        <div class="header-left">
          <a href="login.html" class="btn-back"><i class="fas fa-arrow-left"></i></a>
          <h1>Profil Bisnis</h1>
        </div>
      </div>

      <p class="text-muted mb-16">Lengkapi data usaha Anda agar AKSA dapat menganalisis bisnis dengan tepat.</p>

      <form class="profile-form-page" onsubmit="return handleBusinessProfile(event)">

        <div class="form-section">
          <div class="section-label">Informasi Usaha</div>

          <div class="form-group">
            <label>Nama Usaha</label>
            <input type="text" id="businessName" placeholder="Contoh: Warung Kopi Senja" value="Warung Kopi Senja">
          </div>

          <div class="form-group">
            <label>Jenis Usaha</label>
            <select id="businessType">
              <option value="kedai-kopi" selected>F&B</option>
              <option value="warung">Warung Makan</option>
              <option value="laundry">Laundry</option>
              <option value="bakery">Bakery</option>
              <option value="toko-kelontong">Toko Kelontong</option>
              <option value="bengkel">Bengkel</option>
              <option value="lainnya">Lainnya</option>
            </select>
          </div>

          <div class="form-group">
            <label>Alamat</label>
            <input type="text" id="businessAddress" placeholder="Contoh: Jl. Merdeka No. 10, Jakarta" value="Jl. Merdeka No. 10, Jakarta">
          </div>
        </div>

        <div class="form-section">
          <div class="section-label">Data Bisnis</div>

          <div class="form-group">
            <label>Lama Berdiri</label>
            <select id="businessAge">
              <option value="<1" selected>&lt; 1 tahun</option>
              <option value="1-3">1 - 3 tahun</option>
              <option value="3-5">3 - 5 tahun</option>
              <option value=">5">&gt; 5 tahun</option>
            </select>
          </div>

          <div class="form-group">
            <label>Omzet Bulanan</label>
            <select id="monthlyRevenue">
              <option value="<5">&lt; Rp 5.000.000</option>
              <option value="5-10" selected>Rp 5.000.000 - Rp 10.000.000</option>
              <option value="10-25">Rp 10.000.000 - Rp 25.000.000</option>
              <option value="25-50">Rp 25.000.000 - Rp 50.000.000</option>
              <option value=">50">&gt; Rp 50.000.000</option>
            </select>
          </div>

          <div class="form-group">
            <label>Jumlah Karyawan</label>
            <input type="number" id="employeeCount" placeholder="Contoh: 3" value="3">
          </div>

          <div class="form-group">
            <label>Jam Operasional</label>
            <input type="text" id="operationalHours" placeholder="Contoh: 08:00 - 17:00" value="08:00 - 17:00">
          </div>
        </div>

        <button type="submit" class="btn btn-primary btn-full mt-8">
          Lanjut
          <i class="fas fa-arrow-right"></i>
        </button>
      </form>
    </div>
  </div>

  <script src="js/script.js"></script>
  <script>
    if (localStorage.getItem('aksadarkmode') === 'true') {
      document.querySelector('.phone').classList.add('dark-mode');
    }
  </script>
</body>
</html>
