<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Masuk - AKSA</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="phone">
    <div class="status-bar">
      <span class="time">09:41</span>
      <div class="status-icons">
        <i class="fas fa-signal"></i>
        <i class="fas fa-wifi"></i>
        <i class="fas fa-battery-three-quarters"></i>
      </div>
    </div>

    <div class="content">
      <div class="login-page">
        <div class="login-header">
          <div class="login-icon">
            <img src="assets/logo/aksa-logo.png" alt="AKSA">
          </div>
          <h2>Selamat Datang</h2>
          <p>Masuk untuk melanjutkan</p>
        </div>

        <form class="login-form" onsubmit="return handleLogin(event)">
          <div class="form-group">
            <label>Email</label>
            <input type="email" id="email" placeholder="Masukkan email" autocomplete="email">
          </div>

          <div class="form-group">
            <label>Password</label>
            <input type="password" id="password" placeholder="Masukkan password" autocomplete="current-password">
          </div>

          <div class="forgot-password">
            <a href="#">Lupa Password?</a>
          </div>

          <button type="submit" class="btn btn-primary btn-full">
            Masuk
          </button>

          <div class="divider">Atau</div>

          <button type="button" class="btn btn-google btn-full" onclick="handleGoogleLogin()">
            <i class="fab fa-google"></i>
            Lanjutkan dengan Google
          </button>
        </form>

        <div class="login-footer">
          Belum punya akun? <a href="#">Daftar sekarang</a>
        </div>
      </div>
    </div>
  </div>

  <script src="js/script.js"></script>
</body>
</html>
