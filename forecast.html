<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Prediksi - AKSA</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="phone">
    <div class="status-bar">
      <span class="time">09:41</span>
      <div class="status-icons">
        <i class="fas fa-signal"></i>
        <i class="fas fa-wifi"></i>
        <i class="fas fa-battery-three-quarters"></i>
      </div>
    </div>

    <div class="content">
      <div class="page-header">
        <div class="header-left">
          <button class="hamburger"><i class="fas fa-bars"></i></button>
          <a href="recommendation.html" class="btn-back"><i class="fas fa-arrow-left"></i></a>
          <h1>Prediksi AI</h1>
        </div>
        <div class="header-right">
          <span class="premium-badge"><i class="fas fa-crown"></i> Premium</span>
        </div>
      </div>

      <p class="text-muted mb-16">Prediksi berdasarkan pola data transaksi dan tren musiman bisnis Anda.</p>

      <div class="period-selector" id="periodSelector"></div>

      <div id="forecastContainer"></div>

      <div class="premium-overlay-banner" id="premiumOverlayForecast">
        <i class="fas fa-crown"></i>
        <h3>Buka Prediksi Premium</h3>
        <p>Dapatkan akses ke prediksi AI yang lebih akurat, analisis tren musiman, dan rekomendasi stok otomatis dengan AKSA Premium.</p>
        <button class="btn-premium" onclick="document.getElementById('premiumToggle')?.click(); window.location.href='profile.html'"><i class="fas fa-crown"></i> Upgrade ke Premium</button>
      </div>

      <div class="mt-16">
        <a href="assistant.html" class="btn btn-primary btn-full">
          <i class="fas fa-robot"></i>
          Tanya AI Assistant
        </a>
      </div>
    </div>
  </div>

  <script src="js/script.js"></script>
</body>
</html>
